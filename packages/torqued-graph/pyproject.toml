[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kinform-torqued-graph"
version = "1.0.0"
description = "SQLAlchemy mirror of the KINFORM Torqued Graph Prisma schema."
requires-python = ">=3.11"
dependencies = [
  "SQLAlchemy>=2.0,<3.0",
]

[tool.setuptools.packages.find]
where = ["python"]
